        body {
            font-family: 'Poppins', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;

        /* --- Jackpot Box --- */
        .jackpot-box {
            background: rgba(255, 0, 0, 0.2);

            z-index: 20;

        .jackpot-amount { 
            font-family: 'Orbitron', sans-serif; 
            color: #ffcc00; 
            font-size: 1.2rem; 
            text-shadow: 0 0 10px #ff0000; 
        }

        /* --- Container Utama --- */
        .container {
            width: 90%; 
            max-width: 360px; 
            text-align: center;
            padding: 30px 20px; 
            border: 3px solid #ff0000;
            border-radius: 25px; 
            background: rgba(0, 0, 0, 0.95);
            box-shadow: 0 0 30px #ff0000, inset 0 0 15px #ff0000;
            z-index: 10;
        }

        .logo { 
            font-family: 'Orbitron', sans-serif; 
            font-size: clamp(2.2rem, 9vw, 3.8rem); 
            color: #fff; 
            text-shadow: 0 0 20px #ff0000; 
            margin-bottom: 5px;
            white-space: nowrap;
        }

        /* --- Tombol DAFTAR --- */
        .btn-daftar {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 20px 0;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            color: #fff;
            background: linear-gradient(45deg, #ff0000, #ff6600, #ff0000);
            background-size: 200% 200%;
            border: 2px solid #fff;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            animation: glow 1s infinite alternate, moveBg 3s linear infinite;
        }

        @keyframes glow {
            from { transform: scale(1); }
            to { transform: scale(1.03); }
        }
        @keyframes moveBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .btn-login { 
            display: block; 
            padding: 12px; 
            text-decoration: none; 
            color: #ccc; 
            border: 1px solid #333; 
            border-radius: 10px; 
            background: #111;
            font-size: 0.9rem;
        }

        /* --- Efek Mahjong --- */
        .mahjong { 
            position: absolute; 
            top: -50px; 
            font-size: 25px; 
            z-index: 1; 
            animation: fall linear infinite; 
            opacity: 0.3; 
            pointer-events: none; 
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        /* --- Notif WD --- */
        #wd-toast {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9); border-left: 4px solid #28a745;

<body id="mainBody">

    <div id="wd-toast">
        <span style="color: #28a745; font-weight: bold;">WD BERHASIL!</span><br>
        <span id="wd-text">Member Anto*** Rp 1.500.000</span>
    </div>

    <div class="jackpot-box">
        <div style="font-size: 0.6rem; color: #ffcc00; font-weight: bold;">GRAND JACKPOT PROGRESSIVE</div>
        <div class="jackpot-amount" id="jackpot">IDR 852.140.700</div>
    </div>

    <div class="container">
        <h1 class="logo">ZORO56</h1>
        <p style="color: #00ff00; font-weight: bold; font-size: 0.8rem;">MENANG BERAPAPUN LUNAS BOSKU!</p>
        
        <a href="https://nagacuan44.click/register.php?ref=R618447" class="btn-daftar" onclick="mulaiEfek()">DAFTAR SEKARANG</a>
        <a href="https://nagacuan44.click/register.php?ref=R618447" class="btn-login" onclick="mulaiEfek()">LOGIN MEMBER</a>
    </div>

    <audio id="musikGacor" loop preload="auto">
        <source src="https://www.soundjay.com/free-music/iron-man-01.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 1. Jackpot
        let val = 852140700;
        setInterval(() => {
            val += Math.floor(Math.random() * 50000);
            document.getElementById('jackpot').innerText = "IDR " + val.toLocaleString('id-ID');
        }, 2000);

        // 2. WD Notif
        const users = ["Raja***", "Hoki***", "Zoro***", "Sultan***", "Gacor***"];
        setInterval(() => {
            const toast = document.getElementById('wd-toast');
            document.getElementById('wd-text').innerText = `Member ${users[Math.floor(Math.random()*users.length)]} Rp ${Math.floor(Math.random()*10)+1}.500.000`;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }, 8000);

        // 3. Mahjong
        setInterval(() => {
            const m = document.createElement('div');
            m.className = 'mahjong'; m.innerText = '🀄';
            m.style.left = Math.random() * 95 + 'vw';
            m.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(m);
            setTimeout(() => m.remove(), 7000);
        }, 1000);

        // 4. Suara & Musik
        let aktif = false;
        function mulaiEfek() {
            const audio = document.getElementById('musikGacor');
            audio.play().then(() => {
                if (!aktif) {
                    audio.volume = 0.3;
                    if ('speechSynthesis' in window) {
                        const msg = new SpeechSynthesisUtterance("Ayo sayang, daftar sekarang di zoro lima puluh enam!");
                        msg.lang = 'id-ID';
                        msg.pitch = 1.3;
                        window.speechSynthesis.speak(msg);
                    }
                    aktif = true;
                }
            }).catch(() => {});
        }
        
        // Pemicu sentuhan layar agar audio aktif sebelum klik tombol
        document.body.addEventListener('touchstart', mulaiEfek, {once: true});
        document.body.addEventListener('click', mulaiEfek, {once: true});
    </script>
</body>
</html>
